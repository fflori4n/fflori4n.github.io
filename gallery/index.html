<script>
document.addEventListener("DOMContentLoaded", () => {
  const imgs = document.querySelectorAll(".rand-img");

  imgs.forEach((img, i) => {
    // random rotation + scale
    const rotation = 0;//(Math.random() * 6 - 3).toFixed(2) + "deg";
    const scale = (1.5 + (Math.random() * 0.25 - 0.1)).toFixed(3);

    img.style.setProperty("--rotation", rotation);
    img.style.setProperty("--scale", scale);

    // stagger animation timing (each image starts slightly later)
    //img.style.transitionDelay = `${i * 0.05}s`;

    // fade-in when loaded
    img.addEventListener("load", () => {
      img.classList.add("loaded");
    });
  });
});

const rowHeight = 10; // same as grid-auto-rows
document.querySelectorAll('.rand-img').forEach(img => {
  img.onload = () => {
    const rowSpan = Math.ceil(img.naturalHeight / rowHeight);
    img.style.setProperty('--row-span', rowSpan);
    
    // Optional: add random rotation/scale
    const rotation = (Math.random() * 8 - 4);
    const scale = 0.9 + Math.random() * 0.2;
    img.style.transform = `rotate(${rotation}deg) scale(${scale})`;
  };
});
</script>

<script>
const modal = document.getElementById('img-modal');
const modalImg = document.getElementById('modal-image');
const captionText = document.getElementById('modal-caption');
const closeBtn = document.querySelector('.modal .close');

document.querySelectorAll('.gallery-img').forEach(img => {
  img.addEventListener('click', () => {
    modal.style.display = "block";
    modalImg.src = img.src;
    captionText.innerText = img.dataset.caption;
  });
});

closeBtn.onclick = () => modal.style.display = "none";
modal.onclick = (e) => { if(e.target === modal) modal.style.display = "none"; };
</script>
